<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--font-->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap" rel="stylesheet">
  <!--css-->
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon.png">
  <title>Todo app</title>
</head>
<body>
  <figure class="bg-img">
  </figure>

  <main class="container">
    <header class="container__header">
      <h1>TODO</h1>
      <div class="toggle"></div>
    </header>

    <form class="container__section">
      <header class="todo-item border-radius" id="input-typer">
        <div class="list-circle"></div>
        <input type="text" id="todo-input" placeholder="Create a new todo...">
      </header>
      <section class="container__section--todos">
        
        <!--todo desktop btn set footer-->
        <nav class="todo-item desktop-btns-footer">
          <p></p>
          <ul class="desktop-filter-set">
            <li class="active-filter" id="btn-all">All</li>
            <li id="btn-active">Active</li>
            <li id="btn-completed">Completed</li>
          </ul>
          <p id="btn-clear">Clear Completed</p>
        </nav>
      </section>
      <!--end of container todos-->
    </form>
    <p>Drag and drop to reorder list</p>
  </main>  

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://joseriosdev.github.io/">joseriosdev</a> | Thank you <strong>Jesus</strong> my <strong>LORD</strong>!
  </footer>

  <script src="./scripts/colorThemeToggle.js"></script>
  <script src="./scripts/main.js"></script>
</body>
</html>
